<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="cssW.css" rel="stylesheet" />
    <title> Weather  App</title>
</head>
<body>
    <main>
        <section id="weather-wrapper">
            <h1>Weather App ☁️</h1>
            <div id="weather-search">
                <input id="search" type="text" placeholder="Enter city in Sri Lanka..." />
                <button id="submit" onclick="fetchWeather()">Search</button>
            </div>
            <div id="weather-data" style="display: none;"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
